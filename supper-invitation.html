<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're Invited to Supper!</title>
    <style>
        :root {
            --primary: #0b3d91; /* navy */
            --secondary: #9aa0a6; /* muted gray */
            --dark: #222222;
            --light: #f5f3f1; /* cream */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: var(--dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 450px;
            width: 90%;
            position: relative;
            transform: translateY(0);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .icon {
            font-size: 4rem;
            animation: float 3s ease-in-out infinite;
            display: inline-block;
        }

        h1 {
            color: var(--primary);
            margin-top: 1rem;
        }

        .details {
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 12px;
            margin: 1.5rem 0;
            text-align: left;
            border-left: 5px solid var(--secondary);
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 2rem;
            height: 50px;
            position: relative;
        }

        button {
            padding: 0.8rem 2rem;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #yesBtn {
            background-color: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }

        #yesBtn:hover {
            transform: scale(1.1);
        }

        #noBtn {
            background-color: transparent;
            color: var(--dark);
            border: 1px solid var(--secondary);
            padding: 0.7rem 1.5rem;
            box-shadow: none;
            position: static;
        }

        /* Success Screen Overlay */
        .success-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .success-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-6px); }
            100% { transform: translateX(0); }
        }

        .card.reask {
            animation: shake 0.6s ease;
        }

        /* Animations */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        @keyframes confetti {
            0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            background: var(--secondary);
            top: -10px;
            z-index: 999;
            animation: confetti 2.5s linear infinite;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon">🍲</div>
        <h1>Supper Invitation!</h1>
        <p>Your presence is formally requested for a night of good food and terrible jokes.</p>
        
        <div class="details">
            <strong>🏠 Where:</strong> My Place<br>
            <strong>🍕 Menu:</strong> Chef's Choice (It will be delicious, promise)
        </div>

        <p id="inviteText">The next time my mum makes broad beans, you are invited.</p>

        <div class="btn-container">
            <button id="yesBtn" onclick="acceptInvitation()">Yes, absolutely!</button>
            <button id="noBtn" onclick="reaskQuestion()">No</button>
        </div>

        <!-- Hidden success view -->
        <div class="success-overlay" id="successView">
            <div style="font-size: 5rem;">🎉</div>
            <h2>Woohoo!</h2>
            <p>See you then! I'll start prepping the kitchen. 🍳</p>
        </div>
    </div>

    <script>
        // The No button no longer dodges.

        // Celebrate the "Yes" click
        let noStage = 0;

        function acceptInvitation() {
            document.getElementById('successView').classList.add('show');
            createConfetti();
            // reset confirmation flow
            noStage = 0;
            const inviteText = document.getElementById('inviteText');
            if (inviteText) inviteText.textContent = 'The next time my mum makes broad beans, you are invited.';
        }

        // Simple confetti generator
        function createConfetti() {
            const colors = ['#0b3d91', '#9aa0a6', '#b08b4f', '#6b2a2a'];
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti-piece');
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 2 + 's';
                confetti.style.width = Math.random() * 8 + 6 + 'px';
                confetti.style.height = confetti.style.width;
                document.body.appendChild(confetti);
            }
        }

        // Three-step confirmation flow when clicking No
        function reaskQuestion() {
            const success = document.getElementById('successView');
            if (success) success.classList.remove('show');
            const inviteText = document.getElementById('inviteText');
            const noBtn = document.getElementById('noBtn');
            const card = document.querySelector('.card');
            noStage++;
            if (noStage === 1) {
                if (inviteText) inviteText.textContent = 'Are you sure?';
                card.classList.add('reask');
                setTimeout(() => card.classList.remove('reask'), 600);
            } else if (noStage === 2) {
                if (inviteText) inviteText.textContent = 'Are you super sure?';
                card.classList.add('reask');
                setTimeout(() => card.classList.remove('reask'), 600);
            } else {
                if (inviteText) inviteText.textContent = "It actually wasn't a question.";
                if (noBtn) noBtn.remove();
            }
            const yes = document.getElementById('yesBtn');
            if (yes) yes.focus();
        }
    </script>
</body>
</html>
